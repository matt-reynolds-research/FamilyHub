name: reynolds_family_dashboard
description: Reynolds Family Dashboard for iPad
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  supabase_flutter: ^2.16.0
  google_generative_ai: ^0.4.0
  google_fonts: ^8.1.0
  intl: ^0.20.3
  agent:
    path: ../Agent
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
