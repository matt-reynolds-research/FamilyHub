name: Secret Scan

# Cheap insurance against committing an API key (Supabase / Gemini). Uses the
# gitleaks CLI directly — no license needed, even on org repos. Trimmed from
# the indigo-flow version.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Docs-only pushes carry no code — skip.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 = full history, so the scan sees every commit on the branch.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --log-opts="origin/${{ github.base_ref }}..HEAD" --verbose --redact
          else
            gitleaks detect --source . --log-opts="-1" --verbose --redact
          fi
